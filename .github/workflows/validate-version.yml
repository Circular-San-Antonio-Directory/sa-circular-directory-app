name: Validate Version Bump

on:
  pull_request:
    branches:
      - main
    paths:
      - 'package.json'

jobs:
  check-version:
    name: Check package.json version is bumped
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compare versions
        run: |
          PR_VERSION=$(jq -r '.version' package.json)
          MAIN_VERSION=$(git show origin/main:package.json | jq -r '.version')

          echo "main:  $MAIN_VERSION"
          echo "PR:    $PR_VERSION"

          if [ "$(printf '%s\n' "$MAIN_VERSION" "$PR_VERSION" | sort -V | tail -n1)" != "$PR_VERSION" ] || [ "$PR_VERSION" = "$MAIN_VERSION" ]; then
            echo "Error: package.json version ($PR_VERSION) must be higher than main ($MAIN_VERSION)"
            exit 1
          fi

          echo "Version bump valid: $MAIN_VERSION → $PR_VERSION"
